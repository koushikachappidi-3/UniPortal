<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <section class="card hero">
            <h1 class="hero-title">UniPortal</h1>
            <p class="hero-tagline">Your university course management portal</p>

            <div class="actions">
                <a class="btn btn-primary" th:href="@{/login}">Login</a>
                <a class="btn btn-secondary" th:href="@{/register}">Register</a>
            </div>

            <ul class="feature-list">
                <li>Browse and enroll in courses</li>
                <li>Track your enrolled courses</li>
                <li>Secure role-based access</li>
            </ul>
        </section>
    </div>
</div>

</body>
</html>
