<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <header class="app-header">
            <div>
                <h1 class="app-title">UniPortal</h1>
                <p class="app-subtitle">Dashboard</p>
            </div>
        </header>

        <div class="card">
            <h2 th:text="'Welcome, ' + ${#authentication.name} + '!'">Welcome!</h2>

            <div class="actions">
                <a class="btn btn-primary" th:href="@{/courses}">View Courses</a>
                <a class="btn btn-secondary" sec:authorize="hasRole('STUDENT')" th:href="@{/my-courses}">My Courses</a>
            </div>
        </div>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
    </div>
</div>

</body>
</html>
