<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - My Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <header class="app-header">
            <div>
                <h1 class="app-title">UniPortal</h1>
                <p class="app-subtitle">My Enrollments</p>
            </div>
        </header>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <!-- Nav with active state on My Courses -->
        <div class="nav">
            <a class="btn btn-secondary" th:href="@{/courses}">Courses</a>
            <a class="btn btn-primary active" th:href="@{/my-courses}">My Courses</a>
            <a class="btn btn-secondary" th:href="@{/dashboard}">Dashboard</a>
        </div>

        <h2>My Enrolled Courses</h2>

        <!-- Empty state with link to /courses -->
        <div class="empty-state" th:if="${#lists.isEmpty(enrollments)}">
            <p style="margin:0;">You haven't enrolled in any courses yet.</p>
            <p style="margin:8px 0 0;"><a th:href="@{/courses}">Browse available courses →</a></p>
        </div>

        <div th:if="${!#lists.isEmpty(enrollments)}">
            <div class="card" th:each="en : ${enrollments}">
                <p>
                    <strong th:text="${en.course.code}">CODE</strong>
                    – <span th:text="${en.course.name}">Course Name</span>
                    (Prof: <span th:text="${en.course.professor}">Professor</span>)
                </p>
                <p class="helper-text">
                    Enrolled on:
                    <span th:text="${#temporals.format(en.enrolledAt, 'MMM dd, yyyy HH:mm')}"></span>
                </p>
                <form class="inline-form" th:action="@{/courses/{id}/drop(id=${en.course.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-secondary">Drop</button>
                </form>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" style="margin-top: 16px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
