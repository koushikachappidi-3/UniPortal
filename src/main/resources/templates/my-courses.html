<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - My Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <script defer th:src="@{/js/ui.js}" src="/js/ui.js"></script>
</head>
<body>
<div class="page inner-page">
    <div class="container">
        <div th:replace="~{fragments/header :: appHeader('My Enrollments', ${currentPage}, ${false})}"></div>

        <div class="toast-container">
            <div th:if="${successMessage}" class="toast toast-success js-toast">
                <span th:text="${successMessage}"></span>
                <button type="button" class="toast-close" aria-label="Close">&times;</button>
            </div>
            <div th:if="${warningMessage}" class="toast toast-warning js-toast">
                <span th:text="${warningMessage}"></span>
                <button type="button" class="toast-close" aria-label="Close">&times;</button>
            </div>
            <div th:if="${errorMessage}" class="toast toast-error js-toast">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="toast-close" aria-label="Close">&times;</button>
            </div>
        </div>

        <h2>My Enrolled Courses</h2>

        <!-- Empty state with link to /courses -->
        <div class="empty-state" th:if="${#lists.isEmpty(enrollments)}">
            <p style="margin:0;">You haven't enrolled in any courses yet.</p>
            <p style="margin:8px 0 0;"><a th:href="@{/courses}">Browse available courses →</a></p>
        </div>

        <div th:if="${!#lists.isEmpty(enrollments)}">
            <div class="card enrolled-course-card" th:each="en : ${enrollments}">
                <p>
                    <strong th:text="${en.course.code}">CODE</strong>
                    – <span th:text="${en.course.name}">Course Name</span>
                    (Prof: <span th:text="${en.course.professor}">Professor</span>)
                </p>
                <p class="helper-text">
                    Enrolled on:
                    <span th:text="${#temporals.format(en.enrolledAt, 'MMM dd, yyyy HH:mm')}"></span>
                </p>
                <form class="inline-form" th:action="@{/courses/{id}/drop(id=${en.course.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger js-process-btn">Drop</button>
                </form>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" style="margin-top: 16px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
    </div>
</div>
<script>
    document.querySelectorAll('form').forEach(function (form) {
        form.addEventListener('submit', function () {
            var btn = form.querySelector('.js-process-btn');
            if (!btn) {
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Processing...';
        });
    });
</script>
</body>
</html>
