<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>My Courses</title>
</head>
<body>

<h2>📘 My Enrolled Courses</h2>

<div th:if="${#lists.isEmpty(enrollments)}">
    <p>You are not enrolled in any courses yet.</p>
</div>

<ul th:if="${!#lists.isEmpty(enrollments)}">
    <li th:each="en : ${enrollments}">
        <strong th:text="${en.course.code}">CODE</strong>
        - <span th:text="${en.course.name}">Course Name</span>
        (Prof: <span th:text="${en.course.professor}">Professor</span>)
        <br/>
        Enrolled on: <span th:text="${#temporals.format(en.enrolledAt, 'MMM dd, yyyy HH:mm')}"></span>


        <form th:action="@{/courses/{id}/drop(id=${en.course.id})}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">Drop</button>
        </form>

        <hr/>
    </li>
</ul>

<a th:href="@{/courses}">⬅ Back to Courses</a>
<br/><br/>
<a th:href="@{/dashboard}">⬅ Back to Dashboard</a>

</body>
</html>
