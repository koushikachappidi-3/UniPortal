<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div class="page auth-page">
    <div class="container">
        <header class="app-header">
            <div>
                <h1 class="app-title">UniPortal</h1>
                <p class="app-subtitle">Sign in to your account</p>
            </div>
        </header>

        <div class="card">
            <h2>Login</h2>
            <form class="form-grid" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Username" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p th:if="${param.error}" class="error-text">Invalid credentials</p>
            <p class="helper-text">Don't have an account? <a th:href="@{/register}">Register</a></p>
        </div>
    </div>
</div>
</body>
</html>
