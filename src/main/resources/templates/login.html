<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPortal - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <script defer th:src="@{/js/ui.js}" src="/js/ui.js"></script>
</head>
<body>
<div class="page auth-page">
    <div class="auth-shell">
        <div class="toast-container toast-container-auth">
            <div th:if="${successMessage}" class="toast toast-success js-toast">
                <span th:text="${successMessage}"></span>
                <button type="button" class="toast-close" aria-label="Close">&times;</button>
            </div>
            <div th:if="${param.error}" class="toast toast-error js-toast">
                <span>Invalid credentials</span>
                <button type="button" class="toast-close" aria-label="Close">&times;</button>
            </div>
        </div>

        <div class="card auth-card">
            <div class="auth-logomark" aria-hidden="true">U</div>
            <div class="auth-brand">UniPortal</div>
            <p class="auth-subtitle">Sign in to your account</p>

            <form class="form-grid" th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Username" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="helper-text auth-footer-link">Don't have an account? <a th:href="@{/register}">Register</a></p>
        </div>
    </div>
</div>
</body>
</html>
