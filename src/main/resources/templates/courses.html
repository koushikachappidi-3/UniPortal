<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Courses</title>
</head>
<body>

<h2>📚 Available Courses</h2>

<!-- ADMIN ONLY: Add Course Form -->
<div th:if="${isAdmin}">
  <h3>➕ Add a Course (Admin)</h3>

  <form th:action="@{/courses/new}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <input type="text" name="code" placeholder="Course Code" required />
    <input type="text" name="name" placeholder="Course Name" required />
    <input type="text" name="professor" placeholder="Professor" required />

    <button type="submit">Add</button>
  </form>

  <hr>
</div>

<table border="1" cellpadding="8">
  <thead>
  <tr>
    <th>Course Code</th>
    <th>Course Name</th>
    <th>Professor</th>

    <!-- ADMIN ONLY -->
    <th th:if="${isAdmin}">Admin Actions</th>

    <!-- STUDENT ONLY -->
    <th th:if="${!isAdmin}">Enrollment</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="c : ${courses}">
    <td th:text="${c.code}"></td>
    <td th:text="${c.name}"></td>
    <td th:text="${c.professor}"></td>

    <!-- ADMIN ONLY: Delete button -->
    <td th:if="${isAdmin}">
      <form th:action="@{/courses/delete/{id}(id=${c.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">🗑 Delete</button>
      </form>
    </td>

    <!-- STUDENT ONLY: Enroll/Drop buttons -->
    <td th:if="${!isAdmin}">
      <div th:if="${enrolledCourseIds != null and enrolledCourseIds.contains(c.id)}">
        <form th:action="@{/courses/{id}/drop(id=${c.id})}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit">Drop</button>
        </form>
      </div>

      <div th:if="${enrolledCourseIds == null or !enrolledCourseIds.contains(c.id)}">
        <form th:action="@{/courses/{id}/enroll(id=${c.id})}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit">Enroll</button>
        </form>
      </div>
    </td>
  </tr>
  </tbody>
</table>

<br>

<!-- STUDENT ONLY: My Courses link -->
<div th:if="${!isAdmin}">
  <a th:href="@{/my-courses}">📘 My Courses</a>
  <br><br>
</div>

<a th:href="@{/dashboard}">⬅ Back to Dashboard</a>

<form th:action="@{/logout}" method="post" style="margin-top:10px;">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
  <button type="submit">Logout</button>
</form>

</body>
</html>
