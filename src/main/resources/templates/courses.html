<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniPortal - Courses</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
  <script defer th:src="@{/js/ui.js}" src="/js/ui.js"></script>
</head>
<body>
<div class="page inner-page">
  <div class="container">
    <div th:replace="~{fragments/header :: appHeader('Courses', ${currentPage}, ${isAdmin})}"></div>

    <div class="toast-container">
      <div th:if="${successMessage}" class="toast toast-success js-toast">
        <span th:text="${successMessage}"></span>
        <button type="button" class="toast-close" aria-label="Close">&times;</button>
      </div>
      <div th:if="${warningMessage}" class="toast toast-warning js-toast">
        <span th:text="${warningMessage}"></span>
        <button type="button" class="toast-close" aria-label="Close">&times;</button>
      </div>
      <div th:if="${errorMessage}" class="toast toast-error js-toast">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="toast-close" aria-label="Close">&times;</button>
      </div>
    </div>

    <!-- Search bar -->
    <form method="get" th:action="@{/courses}" style="margin-bottom: 16px;">
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <input type="text"
               name="search"
               th:value="${search}"
               placeholder="Search by course code or name..."
               style="flex:1; min-width:200px;">
        <button type="submit" class="btn btn-primary">Search</button>
        <a class="btn btn-secondary"
           th:if="${search != null and !search.isEmpty()}"
           th:href="@{/courses}">Clear</a>
      </div>
    </form>

    <h2>Available Courses</h2>

    <!-- No results message -->
    <div class="empty-state"
         th:if="${search != null and !search.isEmpty() and #lists.isEmpty(courses)}">
      No courses found for search: <strong th:text="${search}"></strong>
    </div>

    <!-- ADMIN ONLY: Add Course Form -->
    <div class="card admin-form-card" th:if="${isAdmin}">
      <h3>Add a Course (Admin)</h3>
      <form class="form-grid" th:action="@{/courses/new}" th:object="${courseRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div>
          <label for="code">Course Code</label>
          <input id="code" type="text" th:field="*{code}" placeholder="Course Code">
          <span th:if="${#fields.hasErrors('code')}" th:errors="*{code}" class="field-error"></span>
        </div>
        <div>
          <label for="name">Course Name</label>
          <input id="name" type="text" th:field="*{name}" placeholder="Course Name">
          <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
        </div>
        <div>
          <label for="professor">Professor</label>
          <input id="professor" type="text" th:field="*{professor}" placeholder="Professor">
          <span th:if="${#fields.hasErrors('professor')}" th:errors="*{professor}" class="field-error"></span>
        </div>
        <button type="submit" class="btn btn-primary">Add Course</button>
      </form>
    </div>

    <table class="admin-courses-table" th:if="${isAdmin}">
      <thead>
      <tr>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Professor</th>
        <th th:if="${isAdmin}">Enrolled Students</th>
        <th th:if="${isAdmin}">Admin Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr class="admin-courses-row" th:each="c : ${courses}">
        <td th:text="${c.code}"></td>
        <td th:text="${c.name}"></td>
        <td th:text="${c.professor}"></td>

        <!-- ADMIN: enrollment count -->
        <td th:if="${isAdmin}" th:text="${enrollmentCounts[c.id]}">0</td>

        <!-- ADMIN: delete button with confirm dialog -->
        <td th:if="${isAdmin}">
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <form class="js-confirm-form inline-form"
                  th:if="${enrollmentCounts[c.id] > 0}"
                  th:action="@{/courses/{id}/drop-all-enrollments(id=${c.id})}" method="post"
                  data-confirm-message="Drop ALL enrollments for this course? Students will lose their enrollment.">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn btn-warning">Drop Enrollments</button>
            </form>
            <form class="js-confirm-form inline-form"
                  th:action="@{/courses/delete/{id}(id=${c.id})}" method="post"
                  data-confirm-message="Are you sure you want to delete this course? This cannot be undone.">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn btn-danger">Delete</button>
            </form>
          </div>
        </td>

      </tr>
      </tbody>
    </table>

    <!-- STUDENT ONLY: card view -->
    <div th:if="${!isAdmin}" class="course-card-grid">
      <div class="course-student-card" th:each="c : ${courses}">
        <div class="course-code" th:text="${c.code}">CS000</div>
        <div class="course-name" th:text="${c.name}">Course Name</div>
        <div class="course-prof">Professor: <span th:text="${c.professor}">Prof. X</span></div>

        <div th:if="${enrolledCourseIds != null and enrolledCourseIds.contains(c.id)}">
          <form class="inline-form" th:action="@{/courses/{id}/drop(id=${c.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-danger js-process-btn">Drop</button>
          </form>
        </div>

        <div th:if="${enrolledCourseIds == null or !enrolledCourseIds.contains(c.id)}">
          <form class="inline-form" th:action="@{/courses/{id}/enroll(id=${c.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-success js-process-btn">Enroll</button>
          </form>
        </div>
      </div>
    </div>

    <form th:action="@{/logout}" method="post" style="margin-top: 16px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn btn-secondary">Logout</button>
    </form>
  </div>
</div>

<div id="confirmModal" class="modal-overlay" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
    <h3 id="confirmModalTitle">Please Confirm</h3>
    <p id="confirmModalMessage">Are you sure?</p>
    <div class="actions">
      <button id="confirmModalCancel" type="button" class="btn btn-secondary">Cancel</button>
      <button id="confirmModalConfirm" type="button" class="btn btn-danger">Confirm</button>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('form').forEach(function (form) {
    form.addEventListener('submit', function () {
      var btn = form.querySelector('.js-process-btn');
      if (!btn) {
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Processing...';
    });
  });
</script>
</body>
</html>
