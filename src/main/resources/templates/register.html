<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register</title>
</head>
<body>

<h2>Create Student Account</h2>

<form th:action="@{/register}" th:object="${registerRequest}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div>
        <label for="username">Username</label>
        <input id="username" type="text" th:field="*{username}" placeholder="Username" required />
        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></div>
    </div>

    <div>
        <label for="password">Password</label>
        <input id="password" type="password" th:field="*{password}" placeholder="Password" required />
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
    </div>

    <button type="submit">Register</button>
</form>

<a th:href="@{/login}">Already have an account? Login</a>

</body>
</html>
