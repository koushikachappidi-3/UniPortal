<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
<div class="page">
    <div class="container">
        <header class="app-header">
            <div>
                <h1 class="app-title">UniPortal</h1>
                <p class="app-subtitle">Error</p>
            </div>
        </header>

        <div class="card">
            <h2>Something went wrong</h2>
            <p class="error-text" th:text="${errorMessage}">An unexpected error occurred.</p>
            <div class="actions">
                <a class="btn btn-secondary" th:href="@{/}">Back to Home</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
