services:
  postgres:
    image: postgres:16
    container_name: uniportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uniportal
      POSTGRES_USER: uniportal_user
      POSTGRES_PASSWORD: uniportal_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniportal_user -d uniportal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

